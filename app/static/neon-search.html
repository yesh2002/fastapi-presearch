<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spicy 图片搜索控制台</title>
    <style>
      :root {
        --bg-1: #060a1f;
        --bg-2: #0f1230;
        --neon-cyan: #2af6ff;
        --neon-pink: #ff39c9;
        --neon-blue: #5b78ff;
        --text-main: #e8f2ff;
        --text-muted: #95a4c4;
        --panel: rgba(16, 21, 52, 0.72);
        --panel-border: rgba(71, 246, 255, 0.38);
        --danger: #ff5d7a;
        --success: #4dffa7;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        color: var(--text-main);
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: radial-gradient(circle at 0% 0%, #15206d 0%, transparent 36%),
          radial-gradient(circle at 100% 100%, #5f1a56 0%, transparent 30%),
          linear-gradient(120deg, var(--bg-1), var(--bg-2));
      }

      .page {
        width: min(1080px, 100% - 32px);
        margin: 30px auto 40px;
      }

      .hero {
        margin-bottom: 18px;
      }

      .title {
        margin: 0;
        font-size: clamp(26px, 4.2vw, 42px);
        letter-spacing: 0.06em;
        text-shadow: 0 0 12px rgba(42, 246, 255, 0.65), 0 0 24px rgba(255, 57, 201, 0.38);
      }

      .subtitle {
        margin: 10px 0 0;
        color: var(--text-muted);
        font-size: 14px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        backdrop-filter: blur(10px);
        box-shadow: 0 0 20px rgba(42, 246, 255, 0.18), inset 0 0 40px rgba(15, 24, 67, 0.45);
      }

      .search-panel {
        padding: 18px;
      }

      .drop-zone {
        position: relative;
        border: 1px dashed rgba(91, 120, 255, 0.7);
        border-radius: 14px;
        padding: 22px 14px;
        text-align: center;
        cursor: pointer;
        transition: 0.22s ease;
        background: linear-gradient(145deg, rgba(14, 21, 58, 0.82), rgba(16, 17, 44, 0.7));
      }

      .drop-zone:hover,
      .drop-zone.dragover {
        border-color: var(--neon-cyan);
        box-shadow: 0 0 16px rgba(42, 246, 255, 0.32), 0 0 28px rgba(255, 57, 201, 0.2);
      }

      .drop-icon {
        width: 38px;
        height: 38px;
        color: var(--neon-cyan);
        margin: 0 auto 10px;
      }

      .drop-title {
        margin: 0;
        font-size: 16px;
      }

      .drop-desc {
        margin: 8px 0 0;
        color: var(--text-muted);
        font-size: 13px;
      }

      .actions {
        margin-top: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .btn {
        border: 1px solid rgba(42, 246, 255, 0.5);
        background: linear-gradient(130deg, rgba(30, 46, 130, 0.58), rgba(27, 20, 79, 0.5));
        color: var(--text-main);
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        cursor: pointer;
        transition: 0.2s ease;
      }

      .btn:hover {
        box-shadow: 0 0 16px rgba(42, 246, 255, 0.34);
      }

      .btn[disabled] {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .btn-search {
        border-color: rgba(255, 57, 201, 0.66);
        background: linear-gradient(130deg, rgba(125, 18, 106, 0.78), rgba(38, 30, 105, 0.72));
      }

      .preview-wrap {
        margin-top: 14px;
        display: none;
        align-items: center;
        gap: 12px;
      }

      .preview-wrap.show {
        display: flex;
      }

      .preview-wrap img {
        width: 64px;
        height: 64px;
        border-radius: 8px;
        object-fit: cover;
        border: 1px solid rgba(42, 246, 255, 0.7);
      }

      .preview-meta {
        font-size: 12px;
        color: var(--text-muted);
      }

      .status {
        margin-top: 12px;
        min-height: 22px;
        font-size: 13px;
      }

      .status.info {
        color: var(--neon-cyan);
      }

      .status.error {
        color: var(--danger);
      }

      .status.success {
        color: var(--success);
      }

      .results {
        margin-top: 18px;
      }

      .results-head {
        display: none;
        align-items: center;
        justify-content: space-between;
        margin: 0 0 10px;
      }

      .results-head.show {
        display: flex;
      }

      .results-title {
        margin: 0;
        font-size: 17px;
      }

      .results-meta {
        color: var(--text-muted);
        font-size: 12px;
      }

      .results-controls {
        display: none;
        margin: 0 0 10px;
        gap: 10px;
        flex-wrap: wrap;
      }

      .results-controls.show {
        display: flex;
      }

      .control {
        border: 1px solid rgba(91, 120, 255, 0.5);
        border-radius: 8px;
        background: rgba(16, 24, 61, 0.78);
        padding: 6px 8px;
        min-width: 150px;
      }

      .control-label {
        display: block;
        margin: 0 0 4px;
        font-size: 11px;
        color: var(--text-muted);
      }

      .control-select {
        width: 100%;
        border: 1px solid rgba(42, 246, 255, 0.45);
        border-radius: 6px;
        background: rgba(10, 16, 46, 0.92);
        color: var(--text-main);
        font-size: 12px;
        padding: 5px 6px;
      }

      .grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      }

      .card {
        display: flex;
        flex-direction: column;
        border: 1px solid rgba(91, 120, 255, 0.5);
        border-radius: 12px;
        overflow: hidden;
        background: rgba(18, 20, 56, 0.84);
        transition: 0.2s ease;
      }

      .card:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 15px rgba(42, 246, 255, 0.22);
      }

      .card img {
        width: 100%;
        height: 208px;
        object-fit: contain;
        background: #0e1332;
      }

      .card-body {
        padding: 10px 11px 12px;
        flex: 1;
      }

      .card-title {
        margin: 0;
        font-size: 14px;
        line-height: 1.35;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      .card-sub {
        margin-top: 6px;
        color: var(--text-muted);
        font-size: 12px;
      }

      .card-meta {
        margin-top: 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .tag {
        border: 1px solid rgba(42, 246, 255, 0.4);
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 11px;
        color: var(--neon-cyan);
        white-space: nowrap;
      }

      .tag-rank {
        border-color: rgba(255, 57, 201, 0.5);
        color: #ff91e5;
      }

      .sim-wrap {
        margin-top: 8px;
      }

      .sim-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 5px;
        font-size: 11px;
        color: var(--text-muted);
      }

      .sim-track {
        width: 100%;
        height: 6px;
        border-radius: 999px;
        background: rgba(90, 100, 146, 0.35);
        overflow: hidden;
      }

      .sim-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
        border-radius: 999px;
      }

      .profile-link {
        margin-top: 8px;
        color: var(--text-muted);
        font-size: 11px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .card-actions {
        display: flex;
        gap: 8px;
        padding: 0 11px 12px;
      }

      .mini-btn {
        border: 1px solid rgba(91, 120, 255, 0.45);
        border-radius: 8px;
        background: rgba(16, 24, 61, 0.82);
        color: var(--text-main);
        font-size: 12px;
        padding: 6px 8px;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
        flex: 1;
        transition: 0.2s ease;
      }

      .mini-btn:hover {
        border-color: var(--neon-cyan);
        box-shadow: 0 0 10px rgba(42, 246, 255, 0.24);
      }

      .card-inline-detail {
        display: none;
        margin: 0 11px 12px;
        border: 1px solid rgba(91, 120, 255, 0.35);
        border-radius: 8px;
        background: rgba(10, 14, 42, 0.78);
        padding: 10px;
      }

      .card-inline-detail.show {
        display: block;
      }

      .inline-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .inline-item {
        border: 1px solid rgba(91, 120, 255, 0.32);
        border-radius: 8px;
        padding: 6px 8px;
        background: rgba(16, 24, 61, 0.55);
        min-height: 50px;
      }

      .inline-label {
        margin: 0;
        color: var(--text-muted);
        font-size: 11px;
      }

      .inline-value {
        margin: 4px 0 0;
        font-size: 12px;
        word-break: break-all;
      }

      .inline-link {
        color: var(--neon-cyan);
      }

      .inline-raw {
        margin-top: 8px;
        border: 1px solid rgba(91, 120, 255, 0.3);
        border-radius: 8px;
        padding: 7px;
        background: rgba(7, 11, 34, 0.78);
      }

      .inline-raw pre {
        margin: 0;
        max-height: 140px;
        overflow: auto;
        font-size: 11px;
        color: #bfd9ff;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .profile-panel {
        display: none;
        margin-top: 12px;
        padding: 14px;
      }

      .profile-panel.show {
        display: block;
      }

      .profile-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 12px;
      }

      .profile-title {
        margin: 0;
        font-size: 16px;
      }

      .profile-main {
        display: grid;
        grid-template-columns: 96px 1fr;
        gap: 12px;
      }

      .profile-avatar {
        width: 96px;
        height: 96px;
        border-radius: 10px;
        object-fit: contain;
        border: 1px solid rgba(42, 246, 255, 0.65);
        background: #11173d;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px 10px;
      }

      .field {
        border: 1px solid rgba(91, 120, 255, 0.36);
        border-radius: 8px;
        padding: 7px 8px;
        background: rgba(16, 24, 61, 0.55);
        min-height: 52px;
      }

      .field-label {
        margin: 0;
        color: var(--text-muted);
        font-size: 11px;
      }

      .field-value {
        margin: 4px 0 0;
        font-size: 13px;
        word-break: break-all;
      }

      .field-value.link {
        color: var(--neon-cyan);
      }

      .profile-actions {
        margin-top: 10px;
        display: flex;
        gap: 8px;
      }

      .profile-raw {
        margin-top: 10px;
        border: 1px solid rgba(91, 120, 255, 0.35);
        border-radius: 8px;
        padding: 8px;
        background: rgba(9, 14, 42, 0.75);
      }

      .profile-raw-title {
        margin: 0 0 6px;
        color: var(--text-muted);
        font-size: 12px;
      }

      .profile-raw-pre {
        margin: 0;
        max-height: 132px;
        overflow: auto;
        font-size: 11px;
        color: #bfd9ff;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .empty {
        display: none;
        margin-top: 14px;
        border: 1px solid rgba(91, 120, 255, 0.45);
        border-radius: 12px;
        padding: 18px;
        color: var(--text-muted);
        text-align: center;
      }

      .empty.show {
        display: block;
      }

      .results-actions {
        margin-top: 12px;
        display: none;
        justify-content: center;
      }

      .results-actions.show {
        display: flex;
      }

      .hidden-file {
        display: none;
      }

      @media (max-width: 700px) {
        .page {
          width: min(1080px, 100% - 20px);
          margin: 18px auto 28px;
        }

        .search-panel {
          padding: 14px;
        }

        .card img {
          height: 190px;
        }

        .profile-main {
          grid-template-columns: 1fr;
        }

        .profile-avatar {
          width: 100%;
          height: 210px;
        }

        .field-grid {
          grid-template-columns: 1fr;
        }

        .control {
          min-width: 100%;
        }

        .inline-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          transition: none !important;
          animation: none !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1 class="title">SPICY IMAGE SEARCH</h1>
        <p class="subtitle">上传图片后调用后端 `spicy` 模式，展示相似结果。</p>
      </section>

      <section class="panel search-panel" aria-label="上传搜索区">
        <div id="dropZone" class="drop-zone" role="button" tabindex="0" aria-label="上传图片">
          <svg class="drop-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 16V4M12 4l-4 4M12 4l4 4M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          <p class="drop-title">拖拽图片到这里，或点击选择文件</p>
          <p class="drop-desc">支持 JPG/PNG/WebP，最大 10MB</p>
        </div>

        <input id="fileInput" class="hidden-file" type="file" accept="image/jpeg,image/png,image/webp" />

        <div class="actions">
          <button id="pickBtn" class="btn" type="button">选择图片</button>
          <button id="searchBtn" class="btn btn-search" type="button" disabled>开始搜索（spicy）</button>
        </div>

        <div id="previewWrap" class="preview-wrap" aria-live="polite">
          <img id="previewImage" src="" alt="上传预览图" />
          <div id="previewMeta" class="preview-meta"></div>
        </div>

        <div id="status" class="status" aria-live="polite"></div>
      </section>

      <section class="results" aria-label="搜索结果区">
        <div id="resultsHead" class="results-head">
          <h2 class="results-title">匹配结果</h2>
          <div id="resultsMeta" class="results-meta"></div>
        </div>
        <div id="resultsControls" class="results-controls">
          <div class="control">
            <label class="control-label" for="firstLimitSelect">首批条数</label>
            <select id="firstLimitSelect" class="control-select">
              <option value="10">10</option>
              <option value="20">20</option>
              <option value="40" selected>40</option>
              <option value="80">80</option>
            </select>
          </div>
          <div class="control">
            <label class="control-label" for="thresholdSelect">相似度阈值</label>
            <select id="thresholdSelect" class="control-select">
              <option value="0" selected>全部</option>
              <option value="15">>= 15%</option>
              <option value="20">>= 20%</option>
              <option value="25">>= 25%</option>
              <option value="30">>= 30%</option>
            </select>
          </div>
          <div class="control">
            <label class="control-label" for="sortSelect">排序方式</label>
            <select id="sortSelect" class="control-select">
              <option value="relevance" selected>默认相关性</option>
              <option value="similarity_desc">相似度从高到低</option>
              <option value="similarity_asc">相似度从低到高</option>
              <option value="name_asc">昵称 A-Z</option>
              <option value="name_desc">昵称 Z-A</option>
            </select>
          </div>
        </div>
        <div id="resultsGrid" class="grid"></div>
        <div id="empty" class="empty">暂无结果，请尝试更清晰的人脸图片。</div>
        <div id="resultsActions" class="results-actions">
          <button id="loadMoreBtn" class="btn" type="button">加载更多</button>
        </div>
      </section>
    </main>

    <script>
      (function () {
        const dropZone = document.getElementById("dropZone");
        const fileInput = document.getElementById("fileInput");
        const pickBtn = document.getElementById("pickBtn");
        const searchBtn = document.getElementById("searchBtn");
        const previewWrap = document.getElementById("previewWrap");
        const previewImage = document.getElementById("previewImage");
        const previewMeta = document.getElementById("previewMeta");
        const statusEl = document.getElementById("status");
        const resultsHead = document.getElementById("resultsHead");
        const resultsMeta = document.getElementById("resultsMeta");
        const resultsControls = document.getElementById("resultsControls");
        const firstLimitSelect = document.getElementById("firstLimitSelect");
        const thresholdSelect = document.getElementById("thresholdSelect");
        const sortSelect = document.getElementById("sortSelect");
        const resultsGrid = document.getElementById("resultsGrid");
        const emptyEl = document.getElementById("empty");
        const resultsActions = document.getElementById("resultsActions");
        const loadMoreBtn = document.getElementById("loadMoreBtn");

        let selectedFile = null;
        let selectedFileUrl = "";
        let lastSearchSid = "-";
        let lastExpiresAt = "-";
        let resultItems = [];
        let displayedItems = [];
        let hasMoreItems = false;
        let nextResultOffset = 0;
        let totalResultCount = 0;
        let currentPageLimit = 40;
        let activeDetailEl = null;
        let activeDetailBtn = null;

        const setStatus = (type, message) => {
          statusEl.className = "status";
          if (type) {
            statusEl.classList.add(type);
          }
          statusEl.textContent = message || "";
        };

        const resetResults = () => {
          resultsHead.classList.remove("show");
          resultsControls.classList.remove("show");
          resultsMeta.textContent = "";
          resultsGrid.replaceChildren();
          emptyEl.classList.remove("show");
          emptyEl.textContent = "暂无结果，请尝试更清晰的人脸图片。";
          resultsActions.classList.remove("show");
          loadMoreBtn.disabled = false;
          loadMoreBtn.textContent = "加载更多";
          resultItems = [];
          displayedItems = [];
          hasMoreItems = false;
          nextResultOffset = 0;
          totalResultCount = 0;
          activeDetailEl = null;
          activeDetailBtn = null;
        };

        const updateResultMeta = () => {
          const loaded = resultItems.length;
          const shown = displayedItems.length;
          const totalText = totalResultCount > 0 ? String(totalResultCount) : "-";
          resultsMeta.textContent =
            "已加载 " + loaded + " 条 / 展示 " + shown + " 条 / 总计 " + totalText + " 条 · sid: " + lastSearchSid;
        };

        const updateLoadMoreButton = () => {
          if (hasMoreItems && lastSearchSid && lastSearchSid !== "-" && resultItems.length > 0) {
            resultsActions.classList.add("show");
            loadMoreBtn.disabled = false;
            loadMoreBtn.textContent = "加载更多";
          } else {
            resultsActions.classList.remove("show");
            loadMoreBtn.disabled = false;
            loadMoreBtn.textContent = "加载更多";
          }
        };

        const similarityOf = (item) => {
          return item && item.raw && typeof item.raw.similarity_pct === "number" ? item.raw.similarity_pct : 0;
        };

        const nameOf = (item) => {
          const text = (item && (item.title || (item.raw && item.raw.name))) || "";
          return String(text).toLowerCase();
        };

        const parseSourceHost = (urlText) => {
          try {
            if (!urlText) return "-";
            return new URL(urlText).hostname;
          } catch (_error) {
            return "-";
          }
        };

        const escapeHtml = (value) => {
          return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
        };

        const buildInlineDetailHTML = (item, rank) => {
          const raw = item && item.raw ? item.raw : {};
          const url = item && item.url ? item.url : "";
          const similarityValue = typeof raw.similarity_pct === "number" ? raw.similarity_pct + "%" : "-";
          const source = parseSourceHost(url);
          const username = raw.username ? "@" + raw.username : "-";

          const escapedUrl = url || "#";
          const rawJson = JSON.stringify(
            {
              username: raw.username || null,
              name: raw.name || item.title || null,
              similarity_pct: raw.similarity_pct ?? null,
              thumb: raw.thumb || item.thumbnail || null,
              url: raw.url || item.url || null,
            },
            null,
            2
          );

          return (
            '<div class="inline-grid">' +
            '<div class="inline-item"><p class="inline-label">排名</p><p class="inline-value">TOP ' + escapeHtml(rank) + "</p></div>" +
            '<div class="inline-item"><p class="inline-label">昵称</p><p class="inline-value">' + escapeHtml(item.title || "-") + "</p></div>" +
            '<div class="inline-item"><p class="inline-label">用户名</p><p class="inline-value">' + escapeHtml(username) + "</p></div>" +
            '<div class="inline-item"><p class="inline-label">相似度</p><p class="inline-value">' + escapeHtml(similarityValue) + "</p></div>" +
            '<div class="inline-item"><p class="inline-label">来源域名</p><p class="inline-value">' + escapeHtml(source) + "</p></div>" +
            '<div class="inline-item"><p class="inline-label">搜索 SID</p><p class="inline-value">' + escapeHtml(lastSearchSid || "-") + "</p></div>" +
            '<div class="inline-item"><p class="inline-label">结果有效期</p><p class="inline-value">' + escapeHtml(lastExpiresAt || "-") + "</p></div>" +
            '<div class="inline-item"><p class="inline-label">个人主页</p><p class="inline-value"><a class="inline-link" href="' +
            escapeHtml(escapedUrl) +
            '" target="_blank" rel="noopener noreferrer">' +
            escapeHtml(url || "-") +
            "</a></p></div>" +
            "</div>" +
            '<div class="inline-raw"><pre>' +
            escapeHtml(rawJson) +
            "</pre></div>"
          );
        };

        const bytesToSize = (bytes) => {
          if (bytes < 1024) return bytes + " B";
          if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
          return (bytes / (1024 * 1024)).toFixed(1) + " MB";
        };

        const setSelectedFile = (file) => {
          const allowed = ["image/jpeg", "image/png", "image/webp"];
          if (!allowed.includes(file.type)) {
            setStatus("error", "仅支持 JPG / PNG / WebP 图片。");
            return;
          }
          if (file.size > 10 * 1024 * 1024) {
            setStatus("error", "图片超过 10MB，请压缩后再试。");
            return;
          }

          if (selectedFileUrl) {
            URL.revokeObjectURL(selectedFileUrl);
          }
          selectedFile = file;
          selectedFileUrl = URL.createObjectURL(file);
          previewImage.src = selectedFileUrl;
          previewMeta.textContent = file.name + " · " + bytesToSize(file.size);
          previewWrap.classList.add("show");
          searchBtn.disabled = false;
          setStatus("", "");
          resetResults();
        };

        const renderCards = (items) => {
          resultsGrid.replaceChildren();
          if (!items.length) {
            emptyEl.classList.add("show");
            if (resultItems.length > 0) {
              resultsHead.classList.add("show");
              resultsControls.classList.add("show");
              emptyEl.textContent = "当前筛选条件下暂无结果，请降低阈值或切换排序。";
            } else {
              resultsHead.classList.remove("show");
              resultsControls.classList.remove("show");
              emptyEl.textContent = "暂无结果，请尝试更清晰的人脸图片。";
            }
            activeDetailEl = null;
            activeDetailBtn = null;
            updateLoadMoreButton();
            return;
          }

          emptyEl.classList.remove("show");
          emptyEl.textContent = "暂无结果，请尝试更清晰的人脸图片。";
          items.forEach((item, index) => {
            const card = document.createElement("article");
            card.className = "card";

            const img = document.createElement("img");
            img.loading = "lazy";
            img.alt = item.title || "result";
            img.src = item.thumbnail || "";
            img.referrerPolicy = "no-referrer";

            const body = document.createElement("div");
            body.className = "card-body";

            const title = document.createElement("h3");
            title.className = "card-title";
            title.textContent = item.title || "未命名";

            const sub = document.createElement("p");
            sub.className = "card-sub";
            const username = item.raw && item.raw.username ? "@" + item.raw.username : "";
            sub.textContent = username || "未提供用户名";

            const similarityPct = item.raw && typeof item.raw.similarity_pct === "number" ? item.raw.similarity_pct : 0;

            const meta = document.createElement("div");
            meta.className = "card-meta";

            const rankTag = document.createElement("span");
            rankTag.className = "tag tag-rank";
            rankTag.textContent = "TOP " + (index + 1);

            const sourceTag = document.createElement("span");
            sourceTag.className = "tag";
            sourceTag.textContent = parseSourceHost(item.url);
            meta.append(rankTag, sourceTag);

            const simWrap = document.createElement("div");
            simWrap.className = "sim-wrap";

            const simHead = document.createElement("div");
            simHead.className = "sim-head";
            simHead.innerHTML = "<span>相似度</span><span>" + similarityPct + "%</span>";

            const simTrack = document.createElement("div");
            simTrack.className = "sim-track";
            const simFill = document.createElement("div");
            simFill.className = "sim-fill";
            simFill.style.width = Math.max(0, Math.min(100, similarityPct)) + "%";
            simTrack.append(simFill);
            simWrap.append(simHead, simTrack);

            const profileLinkText = document.createElement("p");
            profileLinkText.className = "profile-link";
            profileLinkText.textContent = item.url || "-";

            const actions = document.createElement("div");
            actions.className = "card-actions";

            const detailBtn = document.createElement("button");
            detailBtn.className = "mini-btn";
            detailBtn.type = "button";
            detailBtn.textContent = "查看详情";
            detailBtn.addEventListener("click", () => {
              if (activeDetailEl && activeDetailEl !== detailWrap) {
                activeDetailEl.classList.remove("show");
              }
              if (activeDetailBtn && activeDetailBtn !== detailBtn) {
                activeDetailBtn.textContent = "查看详情";
              }

              const expanded = detailWrap.classList.contains("show");
              if (expanded) {
                detailWrap.classList.remove("show");
                detailBtn.textContent = "查看详情";
                activeDetailEl = null;
                activeDetailBtn = null;
                return;
              }

              detailWrap.innerHTML = buildInlineDetailHTML(item, index + 1);
              detailWrap.classList.add("show");
              detailBtn.textContent = "收起详情";
              activeDetailEl = detailWrap;
              activeDetailBtn = detailBtn;
            });

            const openLink = document.createElement("a");
            openLink.className = "mini-btn";
            openLink.href = item.url || "#";
            openLink.target = "_blank";
            openLink.rel = "noopener noreferrer";
            openLink.textContent = "打开主页";

            actions.append(detailBtn, openLink);

            const detailWrap = document.createElement("div");
            detailWrap.className = "card-inline-detail";

            body.append(title, sub, meta, simWrap, profileLinkText);
            card.append(img, body, actions, detailWrap);
            resultsGrid.append(card);
          });

          activeDetailEl = null;
          activeDetailBtn = null;
          updateLoadMoreButton();
        };

        const applyViewFilters = () => {
          const threshold = Number(thresholdSelect.value || 0);
          const sortMode = sortSelect.value || "relevance";
          let list = resultItems.filter((item) => similarityOf(item) >= threshold);

          if (sortMode === "similarity_desc") {
            list = list.slice().sort((a, b) => similarityOf(b) - similarityOf(a));
          } else if (sortMode === "similarity_asc") {
            list = list.slice().sort((a, b) => similarityOf(a) - similarityOf(b));
          } else if (sortMode === "name_asc") {
            list = list.slice().sort((a, b) => nameOf(a).localeCompare(nameOf(b)));
          } else if (sortMode === "name_desc") {
            list = list.slice().sort((a, b) => nameOf(b).localeCompare(nameOf(a)));
          }

          displayedItems = list;
          renderCards(displayedItems);
          updateResultMeta();
        };

        const appendMoreResults = async () => {
          if (!hasMoreItems || !lastSearchSid || lastSearchSid === "-") {
            updateLoadMoreButton();
            return;
          }

          loadMoreBtn.disabled = true;
          loadMoreBtn.textContent = "加载中...";
          setStatus("info", "正在加载更多结果...");
          try {
            const url =
              "/api/search/image/results?sid=" +
              encodeURIComponent(lastSearchSid) +
              "&limit=" +
              currentPageLimit +
              "&offset=" +
              nextResultOffset;
            const res = await fetch(url, { method: "GET" });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
              const detail = data && data.detail ? String(data.detail) : "加载失败";
              throw new Error(detail);
            }

            const newItems = Array.isArray(data.items) ? data.items : [];
            resultItems = resultItems.concat(newItems);
            hasMoreItems = Boolean(data.has_more);
            nextResultOffset = Number(data.next_offset || 0);
            if (typeof data.total === "number") {
              totalResultCount = data.total;
            }
            if (data.raw && data.raw.expires_at) {
              lastExpiresAt = String(data.raw.expires_at);
            }

            applyViewFilters();
            setStatus("success", "已加载更多结果。");
          } catch (error) {
            setStatus("error", "加载更多失败：" + (error instanceof Error ? error.message : String(error)));
          } finally {
            updateLoadMoreButton();
          }
        };

        const submitSearch = async () => {
          if (!selectedFile) {
            setStatus("error", "请先选择图片。");
            return;
          }
          searchBtn.disabled = true;
          setStatus("info", "搜索中，请稍候...");
          resetResults();
          currentPageLimit = Number(firstLimitSelect.value || 40);
          if (!Number.isFinite(currentPageLimit) || currentPageLimit < 1) {
            currentPageLimit = 40;
          }

          try {
            const fd = new FormData();
            fd.append("image", selectedFile);
            const res = await fetch(
              "/api/search/image/upload?mode=spicy&fetch_full=true&full_limit=" + encodeURIComponent(String(currentPageLimit)),
              {
              method: "POST",
              body: fd,
              }
            );

            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
              const detail = data && data.detail ? String(data.detail) : "请求失败";
              throw new Error(detail);
            }

            const items = Array.isArray(data.items) ? data.items : [];
            resultsHead.classList.add("show");
            resultsControls.classList.add("show");
            const sid = data.raw && data.raw.sid ? data.raw.sid : "-";
            lastSearchSid = sid;
            lastExpiresAt = data.raw && data.raw.expires_at ? String(data.raw.expires_at) : "-";
            hasMoreItems = Boolean(data.raw && data.raw.hasMore);
            nextResultOffset = Number((data.raw && data.raw.nextOffset) || 0);
            totalResultCount = typeof (data.raw && data.raw.total) === "number" ? data.raw.total : items.length;
            resultItems = items;
            applyViewFilters();
            setStatus("success", "搜索完成。");
          } catch (error) {
            setStatus("error", "搜索失败：" + (error instanceof Error ? error.message : String(error)));
          } finally {
            searchBtn.disabled = false;
          }
        };

        pickBtn.addEventListener("click", () => fileInput.click());
        dropZone.addEventListener("click", () => fileInput.click());
        dropZone.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            fileInput.click();
          }
        });
        fileInput.addEventListener("change", () => {
          const file = fileInput.files && fileInput.files[0];
          if (file) {
            setSelectedFile(file);
          }
        });

        dropZone.addEventListener("dragover", (event) => {
          event.preventDefault();
          dropZone.classList.add("dragover");
        });
        dropZone.addEventListener("dragleave", () => {
          dropZone.classList.remove("dragover");
        });
        dropZone.addEventListener("drop", (event) => {
          event.preventDefault();
          dropZone.classList.remove("dragover");
          const file = event.dataTransfer && event.dataTransfer.files && event.dataTransfer.files[0];
          if (file) {
            setSelectedFile(file);
          }
        });

        searchBtn.addEventListener("click", submitSearch);
        loadMoreBtn.addEventListener("click", appendMoreResults);
        thresholdSelect.addEventListener("change", () => {
          if (resultItems.length > 0) {
            applyViewFilters();
          }
        });
        sortSelect.addEventListener("change", () => {
          if (resultItems.length > 0) {
            applyViewFilters();
          }
        });
      })();
    </script>
  </body>
</html>
